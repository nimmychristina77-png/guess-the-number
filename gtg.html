<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Guess The Number</title>
    <meta name="description" content="A premium number guessing game with timer, leaderboard, sound effects, and multiplayer mode.">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="ambient-glow"></div>

    <!-- Sound Toggle -->
    <button id="soundToggle" class="sound-toggle" aria-label="Toggle sound" title="Toggle Sound">
        <svg id="soundOnIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <svg id="soundOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
    </button >
 
    <main class="game-container">
        <header class="game-header">
            <div class="header-line"></div>
            <h1>Guess The Number</h1>
            <p class="tagline">A game of intuition and chance</p>
        </header>

        <!-- Player Setup -->
        <section class="player-setup" id="playerSetup">
            <label class="label-subtle" for="playerNameInput">Your Name</label>
            <div class="player-input-row">
                <input
                    id="playerNameInput"
                    type="text"
                    maxlength="18"
                    placeholder="Enter your name…"
                    autocomplete="off"
                    aria-label="Player name"
                >
                <button id="leaderboardBtn" class="btn-ghost btn-icon" aria-label="View leaderboard" title="Leaderboard">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
                    </svg>
                    <span>Board</span>
                </button>
            </div>
        </section>

        <section class="game-board">
            <div class="difficulty-selector">
                <label class="label-subtle">Difficulty</label>
                <div class="segmented-control">
                    <button class="seg-btn" data-mode="easy">Easy</button>
                    <button class="seg-btn active" data-mode="medium">Medium</button>
                    <button class="seg-btn" data-mode="hard">Hard</button>
                </div>
            </div>

            <!-- Timer -->
            <div class="timer-zone" id="timerZone">
                <div class="timer-bar-track">
                    <div class="timer-bar-fill" id="timerBarFill"></div>
                </div>
                <span class="timer-label" id="timerLabel">&#9201; 60s</span>
            </div>

            <div class="range-display">
                <span class="range-number">1</span>
                <div class="range-line">
                    <div class="range-fill"></div>
                </div>
                <span class="range-number" id="maxRange">100</span>
            </div>

            <div class="input-zone">
                <input 
                    id="guessnumber" 
                    type="number" 
                    min="1" 
                    max="100" 
                    placeholder="Press Start to play"
                    autocomplete="off"
                    aria-label="Your guess"
                    disabled
                >
                <button id="CheckBtn" class="btn-primary" disabled>
                    <span>Reveal</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </svg>
                </button>
            </div>

            <div class="secondary-actions">
                <button id="hintBtn" class="btn-ghost" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                    <span id="hintsLeft">1</span> Hint
                </button>
                <button id="resetBtn" class="btn-ghost">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/>
                        <path d="M21 3v5h-5"/>
                        <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/>
                        <path d="M3 21v-5h5"/>
                    </svg>
                    New Game
                </button>
            </div>

            <!-- Start Game Button -->
            <button id="startBtn" class="btn-start">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                Start Game
            </button>
        </section>

        <section class="feedback-zone">
            <div id="result" class="result-message" role="status" aria-live="polite">
                <span class="result-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </span>
                <span class="result-text">Test your intuition</span>
            </div>
        </section>

        <section class="stats-zone">
            <div class="stat-card attempts">
                <span class="stat-value" id="attemptsLeft">10</span>
                <span class="stat-label">Chances</span>
            </div>
            <div class="stat-card score">
                <span class="stat-value" id="scoreValue">10</span>
                <span class="stat-label">Score</span>
            </div>
            <div class="stat-card best">
                <span class="stat-value" id="bestValue">0</span>
                <span class="stat-label">Best</span>
            </div>
        </section>

        <section class="history-zone" id="historyZone">
            <div class="history-header">
                <span class="label-subtle">Previous Guesses</span>
                <span class="history-count" id="historyCount">0</span>
            </div>
            <div id="guessList" class="guess-chips"></div>
        </section>

        <footer class="game-footer">
            <div class="warmth-indicator" id="warmthIndicator"></div>
            <p class="hint-text">Press <kbd>.</kbd> to focus input</p>
        </footer>
    </main>

    <!-- Victory Overlay -->
    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-content">
            <div class="victory-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
            </div>
            <h2 class="victory-title">Magnificent</h2>
            <p class="victory-number">The number was <strong id="victoryNumber">42</strong></p>
            <p class="victory-score">Final Score: <span id="victoryScore">10</span></p>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div class="leaderboard-overlay" id="leaderboardOverlay" role="dialog" aria-labelledby="leaderboardTitle" aria-modal="true">
        <div class="leaderboard-modal">
            <div class="leaderboard-header">
                <h2 id="leaderboardTitle">&#127942; Leaderboard</h2>
                <button id="closeLeaderboard" class="btn-close" aria-label="Close leaderboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="leaderboard-tabs">
                <button class="lb-tab active" data-diff="all">All</button>
                <button class="lb-tab" data-diff="easy">Easy</button>
                <button class="lb-tab" data-diff="medium">Medium</button>
                <button class="lb-tab" data-diff="hard">Hard</button>
            </div>
            <div id="leaderboardList" class="leaderboard-list"></div>
            <button id="clearLeaderboard" class="btn-clear">Clear Board</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
